server:
    port: 8080

spring:
    datasource:
        url: jdbc:h2:mem:aiplanner
        driverClassName: org.h2.Driver
        username: sa
        password:
    
    h2:
        console:
            enabled: true
            path: /h2-console
    
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: update
        show-sql: false

azure:
    openai:
        endpoint: "${AZURE_OPENAI_ENDPOINT:https://your-resource.openai.azure.com/}"
        api-key: "${AZURE_OPENAI_KEY:REPLACE_ME}"
        deployment-name: "${AZURE_OPENAI_DEPLOYMENT:gpt-4o}"

jira:
    site-url: "${JIRA_SITE_URL:https://YOUR-ORG.atlassian.net}"
    email: "${JIRA_EMAIL:your-email@example.com}"
    api-token: "${JIRA_API_TOKEN:REPLACE_ME}"
    project-key: "${JIRA_PROJECT_KEY:AIP}"

