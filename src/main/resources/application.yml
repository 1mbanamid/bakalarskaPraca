server:
    port: 8080

spring:
    datasource:
        url: jdbc:h2:file:./data/aiplanner;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driverClassName: org.h2.Driver
        username: sa
        password:
    
    h2:
        console:
            enabled: true
            path: /h2-console
    
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: update
        show-sql: false

azure:
    openai:
        endpoint: "${AZURE_OPENAI_ENDPOINT}"
        api-key: "${AZURE_OPENAI_KEY}"
        deployment-name: "${AZURE_OPENAI_DEPLOYMENT:gpt-4o}"

jira:
    site-url: "${JIRA_SITE_URL}"
    email: "${JIRA_EMAIL}"
    api-token: "${JIRA_API_TOKEN}"
    project-key: "${JIRA_PROJECT_KEY:AIP}"

